when:
  - event: ["push"]
    branch: ["main"]
  - event: ["pull_request"]
    branch: ["main"]

engine: "nixery"

dependencies:
  nixpkgs:
    - go

steps:
  - name: "Build"
    command: "go build ./..."

  - name: "Test"
    command: "go test -race ./..."

  - name: "Vet"
    command: "go vet ./..."

  - name: "Lint"
    command: |
      go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      golangci-lint run ./...
